name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/**'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      
    steps:
      - uses: actions/checkout@v3
      
      - uses: supabase/setup-cli@v1
        with:
          version: latest
          
      - name: Set Supabase Secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env.func
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.func
          echo "SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}" >> .env.func
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env.func
          echo "ADMIN_TELEGRAM_ID=${{ secrets.ADMIN_TELEGRAM_ID }}" >> .env.func
          supabase secrets set --env-file .env.func --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Deploy Database Schema (Optional)
        # You need to add DB_PASSWORD as a secret in your GitHub repository
        # It runs the schema.sql against your Supabase database securely
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        if: ${{ env.DB_PASSWORD != '' }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} -p $DB_PASSWORD
          # supabase db push pushes migrations. But to apply a specific schema file via CLI:
          PGPASSWORD=$DB_PASSWORD psql -h aws-0-eu-central-1.pooler.supabase.com -p 6543 -d postgres -U postgres.${{ secrets.SUPABASE_PROJECT_ID }} -f supabase_config/schema.sql || true

      - name: Deploy Auth Function
        run: supabase functions deploy auth --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt
        
      - name: Deploy Submit Task Function
        run: supabase functions deploy submit_task --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt
        
      - name: Deploy Withdraw Function
        run: supabase functions deploy withdraw --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt
        
      - name: Deploy Deposit Function
        run: supabase functions deploy deposit --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt
        
      - name: Deploy Admin Action Function
        run: supabase functions deploy admin_action --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy Create Task Function
        run: supabase functions deploy create_task --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy Verify Task Submission Function
        run: supabase functions deploy verify_task_submission --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy Telegram Webhook Function
        run: supabase functions deploy telegram-webhook --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

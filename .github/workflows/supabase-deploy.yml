name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/**'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      
    steps:
      - uses: actions/checkout@v3
      
      - uses: supabase/setup-cli@v1
        with:
          version: latest
          
      - name: Deploy Auth Function
        run: supabase functions deploy auth --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt
        
      - name: Deploy Submit Task Function
        run: supabase functions deploy submit_task --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt
        
      - name: Deploy Withdraw Function
        run: supabase functions deploy withdraw --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt
        
      - name: Deploy Deposit Function
        run: supabase functions deploy deposit --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt
        
      - name: Deploy Admin Action Function
        run: supabase functions deploy admin_action --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy Create Task Function
        run: supabase functions deploy create_task --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy Verify Task Submission Function
        run: supabase functions deploy verify_task_submission --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy Telegram Webhook Function
        run: supabase functions deploy telegram-webhook --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

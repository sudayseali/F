name: Deploy Supabase Project (Database & Edge Functions)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Secrets
        run: |
          if [ -z "$PROJECT_ID" ]; then
            echo "Error: SUPABASE_PROJECT_ID secret is missing or empty."
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "Error: SUPABASE_DB_PASSWORD secret is missing or empty."
            exit 1
          fi

      - name: Set Supabase Secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env.func
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.func
          echo "SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}" >> .env.func
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env.func
          echo "ADMIN_TELEGRAM_ID=${{ secrets.ADMIN_TELEGRAM_ID }}" >> .env.func
          supabase secrets set --env-file .env.func --project-ref ${{ env.PROJECT_ID }} || true

      - name: Deploy Database Schema 
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ env.PROJECT_ID }}"
          supabase db push

      - name: Deploy all Edge Functions
        run: supabase functions deploy --project-ref ${{ env.PROJECT_ID }} --no-verify-jwt || true

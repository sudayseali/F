name: Deploy Supabase Project (Database & Edge Functions)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Secrets
        run: |
          if [ -z "$PROJECT_ID" ]; then
            echo "Error: SUPABASE_PROJECT_ID secret is missing or empty."
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "Error: SUPABASE_DB_PASSWORD secret is missing or empty."
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "Error: SUPABASE_ACCESS_TOKEN secret is missing or empty."
            exit 1
          fi

      - name: Set Supabase Secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env.func
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.func
          echo "SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}" >> .env.func
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env.func
          echo "ADMIN_TELEGRAM_ID=${{ secrets.ADMIN_TELEGRAM_ID }}" >> .env.func
          supabase secrets set --env-file .env.func --project-ref ${{ env.PROJECT_ID }} || true

      - name: Deploy Database Schema 
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          passwords=(
            "Xirfadsame123!@#"
            "xirfadsame123!@#"
            "Xirfadsame123!"
            "Xirfadsame123"
            "Xirfadsame!@#123"
            "Xirfad123!@#"
            "Xirfadsame@123"
            "Xirfadsame1234"
            "Xirfadsame12345"
            "xirfadsame123"
            "${{ secrets.SUPABASE_DB_PASSWORD }}"
          )
          
          SUCCESS=0
          for p in "${passwords[@]}"; do
            echo "Trying a password variation..."
            export SUPABASE_DB_PASSWORD="$p"
            if supabase link --project-ref "${{ env.PROJECT_ID }}" -p "$p"; then
              if supabase db push -p "$p"; then
                echo "============================================="
                echo "SUCCESS! The correct password is: $p"
                echo "NOTE: Fadlan password-ka saxda ah ku xafid Github Secrets (SUPABASE_DB_PASSWORD)"
                echo "============================================="
                SUCCESS=1
                break
              fi
            fi
          done
          
          if [ $SUCCESS -eq 0 ]; then
            echo "============================================="
            echo "Dhammaan password-yadii waa ay fashilmeen."
            echo "Fadlan dib ugu noqo Supabase Dashboard -> Project Settings -> Database -> Database Password"
            echo "Kaddib samee 'Reset Password' oo password cusub daji."
            echo "============================================="
            exit 1
          fi

      - name: Deploy all Edge Functions
        run: supabase functions deploy --project-ref ${{ env.PROJECT_ID }} --no-verify-jwt || true
